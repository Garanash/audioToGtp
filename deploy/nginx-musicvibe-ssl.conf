# HTTP — редирект на HTTPS (certbot использует /.well-known/acme-challenge/)
server {
    listen 80;
    server_name musicvibe.ru www.musicvibe.ru 37.252.22.95;
    root /opt/gtpconverter/dist;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name musicvibe.ru www.musicvibe.ru 37.252.22.95;
    root /opt/gtpconverter/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/musicvibe.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/musicvibe.ru/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location ~ \.mjs$ {
        default_type application/javascript;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }
    location ~ \.wasm$ {
        default_type application/wasm;
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";
    }

    location /api/ {
        rewrite ^/api(.*)$ $1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 1800s;
        client_max_body_size 100M;
    }

    location /models {
        alias /opt/gtpconverter/public/models;
        add_header Cache-Control "public, max-age=86400";
    }
}
