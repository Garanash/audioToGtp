services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      USE_CELERY: "1"
    depends_on:
      - redis
    ports:
      - "8000:8000"
    volumes:
      - api_data:/app/server/data

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    command: celery -A celery_app worker -l info -c 2
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      USE_CELERY: "1"
    depends_on:
      - redis
      - api
    volumes:
      - api_data:/app/server/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  redis_data:
  api_data:
